<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakila Database Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="/" class="navbar-brand">&#9654; Sakila</a>
        <a href="/" class="nav-link">Actors</a>
        <a href="{{ url_for('top_rated_films') }}" class="nav-link">Top Rated Films</a>
    </div>
</nav>

<div class="container">
    <h1>Actors</h1>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="actor-table-body">
        {% for actor in actors %}
        <tr id="actor-{{ actor.actor_id }}">
            <td>{{ loop.index }}</td>
            <td>{{ actor.first_name }}</td>
            <td>{{ actor.last_name }}</td>
            <td>
                <button class="btn btn-primary"
                        onclick="openEditModal({{ actor.actor_id }}, '{{ actor.first_name }}', '{{ actor.last_name }}')">
                    Edit
                </button>
                <button class="btn btn-danger" onclick="deleteActor({{ actor.actor_id }})">Delete</button>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <button class="btn btn-success" onclick="openCreateModal()">+ Add New Actor</button>

    <!-- Create Actor Modal -->
    <div id="createModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeCreateModal()">&times;</span>
            <h2>Add New Actor</h2>
            <form id="create-form">
                <div class="form-group">
                    <label for="create-firstName">First Name</label>
                    <input type="text" id="create-firstName" name="first_name" placeholder="e.g. Meryl" required>
                </div>
                <div class="form-group">
                    <label for="create-lastName">Last Name</label>
                    <input type="text" id="create-lastName" name="last_name" placeholder="e.g. Streep" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Actor</button>
            </form>
        </div>
    </div>

    <!-- Edit Actor Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Actor</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-actor-id">
                <div class="form-group">
                    <label for="edit-firstName">First Name</label>
                    <input type="text" id="edit-firstName" name="first_name" required>
                </div>
                <div class="form-group">
                    <label for="edit-lastName">Last Name</label>
                    <input type="text" id="edit-lastName" name="last_name" required>
                </div>
                <button type="submit" class="btn btn-primary">Update Actor</button>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    function openCreateModal() { $('#createModal').show(); }
    function closeCreateModal() { $('#createModal').hide(); }
    function openEditModal(id, firstName, lastName) {
        $('#edit-actor-id').val(id);
        $('#edit-firstName').val(firstName);
        $('#edit-lastName').val(lastName);
        $('#editModal').show();
    }
    function closeEditModal() { $('#editModal').hide(); }

    $(window).click(function (event) {
        if ($(event.target).is('#createModal')) closeCreateModal();
        if ($(event.target).is('#editModal')) closeEditModal();
    });

    $('#create-form').submit(function (e) {
        e.preventDefault();
        $.ajax({
            url: '/api/actors',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ first_name: $('#create-firstName').val(), last_name: $('#create-lastName').val() }),
            success: function () { location.reload(); },
            error: function () { alert('Error creating actor.'); }
        });
    });

    $('#edit-form').submit(function (e) {
        e.preventDefault();
        const actorId = $('#edit-actor-id').val();
        $.ajax({
            url: `/api/actors/${actorId}`,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ first_name: $('#edit-firstName').val(), last_name: $('#edit-lastName').val() }),
            success: function () { location.reload(); },
            error: function () { alert('Error updating actor.'); }
        });
    });

    function renumberRows() {
        $('#actor-table-body tr').each(function(index) {
            $(this).find('td:first').text(index + 1);
        });
    }

    function deleteActor(actorId) {
        if (confirm('Are you sure you want to delete this actor?')) {
            $.ajax({
                url: `/api/actors/${actorId}`,
                type: 'DELETE',
                success: function () {
                    $(`#actor-${actorId}`).remove();
                    renumberRows();
                },
                error: function () { alert('Error deleting actor.'); }
            });
        }
    }
</script>
</body>
</html>
